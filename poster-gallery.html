<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Poster Gallery</title>
  <link rel="stylesheet" href="css/style-poster.css">
</head>
<body>
  <main class="container">
    <h1>Cool Stars 23 Poster Gallery</h1>

      <input
        type="search"
        id="searchInput"
        placeholder="Search by title or author..."

    </div>

    <div id="gallery" class="gallery"></div>
    
    <div class="back-link">
    <a href="index.html">← Back to Cool Stars 23 top page</a>
    </div>

  <script src="gallery.js?v=7"></script>
